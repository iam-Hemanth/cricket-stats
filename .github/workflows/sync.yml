name: Sync Cricsheet Data

on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours (UTC)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-cricsheet-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PYTHONUNBUFFERED: '1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Restore sync state
        id: sync_state_restore
        uses: actions/cache/restore@v4
        with:
          path: ingestion/.last_sync
          key: sync-state-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            sync-state-${{ github.ref_name }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate DATABASE_URL secret
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret is missing."
            echo "Add it in GitHub repo Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Run sync
        run: python ingestion/sync.py

      - name: Save sync state
        if: success()
        uses: actions/cache/save@v4
        with:
          path: ingestion/.last_sync
          key: sync-state-${{ github.ref_name }}-${{ github.run_id }}