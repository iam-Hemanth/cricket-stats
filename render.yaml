services:
  - type: web
    name: cricstats-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://cricstatsapp.vercel.app,https://cricket-stats-gamma.vercel.app
      - key: PYTHON_VERSION
        value: 3.11.0
